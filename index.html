<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonin Slovník™</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdf6ec;
      --paper: #fffdf7;
      --ink: #1a1209;
      --accent: #c0392b;
      --accent2: #2c6e49;
      --muted: #7a6a55;
      --border: #d4c4a8;
      --highlight: #f9e4b7;
      --stamp: #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.12) 28px);
      font-family: 'Courier Prime', monospace;
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }
    header { max-width: 760px; margin: 0 auto 48px; text-align: center; }
    .stamp {
      display: inline-block;
      border: 3px solid var(--stamp);
      color: var(--stamp);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 5px 14px;
      transform: rotate(-2deg);
      margin-bottom: 20px;
      opacity: 0.85;
    }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 4.8rem); font-weight: 700; line-height: 1; letter-spacing: -1px; margin-bottom: 8px; }
    h1 span { font-style: italic; color: var(--accent); }
    .subtitle { font-size: 13px; color: var(--muted); letter-spacing: 1px; margin-top: 10px; font-style: italic; }
    .divider { border: none; border-top: 2px solid var(--ink); border-bottom: 1px solid var(--ink); height: 4px; margin: 24px 0; }
    .search-wrap { max-width: 760px; margin: 0 auto 40px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--paper); border: 2px solid var(--ink);
      font-family: 'Courier Prime', monospace; font-size: 18px;
      padding: 14px 50px 14px 20px; outline: none; color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink); transition: box-shadow 0.15s;
    }
    .search-wrap input:focus { box-shadow: 6px 6px 0 var(--accent); }
    .search-wrap input::placeholder { color: var(--border); }
    .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; pointer-events: none; }
    .dictionary { max-width: 760px; margin: 0 auto; }
    .letter-section { margin-bottom: 36px; }
    .letter-heading { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--accent); line-height: 1; border-bottom: 2px solid var(--border); padding-bottom: 4px; margin-bottom: 16px; }
    .entry { background: var(--paper); border-left: 4px solid var(--ink); padding: 16px 20px 16px 18px; margin-bottom: 12px; animation: slideIn 0.3s ease; transition: border-color 0.2s; }
    .entry:hover { border-color: var(--accent); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    .entry-header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .soni-word { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; font-style: italic; }
    .arrow { color: var(--muted); font-size: 14px; flex-shrink: 0; }
    .czech-word { font-size: 1rem; font-weight: 700; letter-spacing: 0.5px; color: var(--accent2); text-transform: uppercase; }
    .entry-example { margin-top: 7px; font-size: 13px; color: var(--muted); font-style: italic; }
    .entry-example::before { content: '"'; }
    .entry-example::after  { content: '"'; }
    .count-badge { display: inline-block; background: var(--highlight); border: 1px solid var(--border); font-size: 11px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; color: var(--muted); }
    .empty-msg { text-align: center; color: var(--muted); font-style: italic; padding: 48px 0; font-size: 15px; }
    .loading { text-align: center; color: var(--muted); font-style: italic; padding: 48px 0; font-size: 14px; letter-spacing: 1px; }
    .error-msg { max-width: 760px; margin: 0 auto; background: #fff0f0; border: 2px solid var(--accent); padding: 16px 20px; font-size: 13px; color: var(--accent); }
    .error-msg code { background: #ffe0e0; padding: 2px 6px; }
    footer { text-align: center; margin-top: 60px; font-size: 11px; color: var(--border); letter-spacing: 1px; }
  </style>
</head>
<body>
<header>
  <div class="stamp">Interní dokument · Přísně tajné</div>
  <h1>Sonin<br><span>Slovník™</span></h1>
  <p class="subtitle">Oficiální překladový manuál · 1. vydání</p>
  <hr class="divider" />
  <p style="font-size:13px; color:var(--muted); font-style:italic;">Komplexní průvodce pro překlad z&nbsp;<em>Soniných slovíček</em> do srozumitelné češtiny.</p>
</header>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Hledej Sonino slovíčko…" oninput="renderDictionary()" />
  <span class="search-icon">🔍</span>
</div>

<div class="dictionary" id="dictionaryContainer">
  <p class="loading">Načítám slovník…</p>
</div>

<footer>Sonin Slovník™ · Interní vydání · Všechna práva (nepochopena) vyhrazena</footer>

<script>
  let entries = [];

  async function loadWords() {
    try {
      const res = await fetch('words.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      entries = await res.json();
      renderDictionary();
    } catch (err) {
      document.getElementById('dictionaryContainer').innerHTML =
        '<div class="error-msg"><strong>Nepodařilo se načíst slovník.</strong><br><br>' +
        'Ujisti se, že soubor <code>words.json</code> je ve stejné složce jako tato stránka.<br>' +
        '<small style="opacity:0.7;margin-top:6px;display:block;">Chyba: ' + err.message + '</small></div>';
    }
  }

  function renderDictionary() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const container = document.getElementById('dictionaryContainer');
    let filtered = entries.filter(e =>
      e.soni.toLowerCase().includes(query) ||
      e.czech.toLowerCase().includes(query) ||
      (e.example && e.example.toLowerCase().includes(query))
    );
    if (filtered.length === 0) {
      container.innerHTML = '<p class="empty-msg">Žádný výraz nenalezen.<br>Možná ho Soňa ještě nepoužila — nebo nikdo nepochopil, že to byl výraz.</p>';
      return;
    }
    const groups = {};
    filtered.sort((a, b) => a.soni.localeCompare(b.soni, 'cs')).forEach(e => {
      const letter = e.soni[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(e);
    });
    let html = '';
    for (const letter of Object.keys(groups).sort((a, b) => a.localeCompare(b, 'cs'))) {
      html += '<div class="letter-section"><div class="letter-heading">' + letter +
        ' <span class="count-badge">' + groups[letter].length + '</span></div>';
      for (const e of groups[letter]) {
        html += '<div class="entry"><div class="entry-header">' +
          '<span class="soni-word">' + escHtml(e.soni) + '</span>' +
          '<span class="arrow">→</span>' +
          '<span class="czech-word">' + escHtml(e.czech) + '</span></div>' +
          (e.example ? '<div class="entry-example">' + escHtml(e.example) + '</div>' : '') +
          '</div>';
      }
      html += '</div>';
    }
    container.innerHTML = html;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadWords();
</script>
</body>
</html>
